<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBA Live Scores</title>
  <script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 900px;
      margin: 0 auto 28px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    h1 span { color: #c9343a; }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #last-updated {
      font-size: 0.75rem;
      color: #999;
    }

    button {
      background: #f0f0f0;
      border: 1px solid #d0d0d0;
      color: #333;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.15s, color 0.15s;
    }

    button:hover { background: #e0e0e0; color: #111; }
    button:disabled { opacity: 0.4; cursor: default; }

    .section-heading {
      max-width: 900px;
      margin: 28px auto 12px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #aaa;
      padding-left: 2px;
    }

    .section-heading:first-child { margin-top: 0; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #f8f9fa;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 20px;
      transition: border-color 0.2s;
    }

    .card.live {
      border-color: #c9343a;
      box-shadow: 0 0 0 1px #c9343a22, 0 4px 24px #c9343a11;
    }

    .card.upcoming {
      border-color: #e8e8e8;
      opacity: 0.85;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }

    .status-badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
      background: #eeeeee;
      color: #777;
    }

    .status-badge.live {
      background: #c9343a;
      color: #fff;
    }

    .status-badge.upcoming {
      background: #e8f0fb;
      color: #3366bb;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #c9343a;
      animation: pulse 1.1s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .clock { font-size: 0.75rem; color: #aaa; margin-left: auto; }

    .teams {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .team-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .team-logo {
      width: 36px;
      height: 36px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .seed {
      font-size: 0.65rem;
      font-weight: 700;
      color: #bbb;
      min-width: 18px;
      flex-shrink: 0;
      text-align: center;
    }

    .team-meta {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .team-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #111;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-sub {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .playoff-rec {
      font-size: 0.68rem;
      font-weight: 600;
      color: #555;
    }

    .team-record {
      font-size: 0.68rem;
      color: #bbb;
      font-weight: 400;
    }

    .series-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
      font-size: 0.7rem;
    }

    .series-round { font-weight: 600; color: #aaa; letter-spacing: 0.3px; }
    .series-score-text { font-weight: 800; color: #333; }

    .score {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -1px;
      min-width: 44px;
      text-align: right;
    }

    .score.leader { color: #111111; }
    .score.trailing { color: #ccc; }

    .divider {
      height: 1px;
      background: #eeeeee;
      margin: 4px 0;
    }

    #empty {
      max-width: 900px;
      margin: 60px auto;
      text-align: center;
      color: #999;
    }

    #empty h2 { font-size: 1.1rem; margin-bottom: 8px; }
    #empty p { font-size: 0.85rem; }

    #error-msg {
      max-width: 900px;
      margin: 60px auto;
      text-align: center;
      color: #c9343a;
      font-size: 0.9rem;
    }

    .spinner {
      max-width: 900px;
      margin: 80px auto;
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
    }

    .auto-refresh {
      font-size: 0.7rem;
      color: #bbb;
      text-align: center;
      max-width: 900px;
      margin: 20px auto 0;
    }

    .final-score .score { font-size: 1.4rem; }

    #more-games-wrap {
      max-width: 900px;
      margin: 24px auto 0;
      text-align: center;
    }

    #more-games-btn {
      background: #fff;
      border: 1px solid #d0d0d0;
      color: #555;
      padding: 9px 20px;
      font-size: 0.85rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    #more-games-btn:hover { background: #f0f0f0; color: #111; }
    #more-games-btn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <header>
    <h1><span>NBA</span> Live Scores</h1>
    <div class="controls">
      <span id="last-updated"></span>
      <button id="refresh-btn" onclick="posthog.capture('scores_refreshed'); fetchScores()">Refresh</button>
    </div>
  </header>

  <div id="content"></div>
  <div id="empty" style="display:none">
    <h2>No games found</h2>
    <p>Check back later.</p>
  </div>
  <div id="error-msg" style="display:none"></div>
  <div class="spinner" id="spinner">Loading scores...</div>
  <div id="more-games-wrap" style="display:none">
    <button id="more-games-btn" onclick="loadMoreGames()">Show additional games</button>
  </div>
  <p class="auto-refresh" id="auto-refresh-note"></p>

  <script>
    const API = "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard";
    const STANDINGS_API = "https://site.api.espn.com/apis/v2/sports/basketball/nba/standings";
    const CORE_API = "https://sports.core.api.espn.com/v2/sports/basketball/leagues/nba";

    function getNBASeason() {
      const d = new Date();
      return d.getMonth() >= 9 ? d.getFullYear() + 1 : d.getFullYear();
    }
    const NBA_SEASON = getNBASeason();

    let seedMap = {};
    let seedsLoaded = false;
    let playoffRecordCache = {};
    let refreshTimer;
    let additionalLoaded = false;
    let isInitialLoad = true;

    async function loadSeeds() {
      try {
        const res = await fetch(`${STANDINGS_API}?season=${NBA_SEASON}&seasontype=2`);
        const data = await res.json();
        for (const conf of data.children || []) {
          for (const entry of conf.standings.entries) {
            const tid = entry.team.id;
            for (const stat of entry.stats || []) {
              if (stat.name === 'playoffSeed') seedMap[tid] = Math.round(stat.value);
            }
          }
        }
        seedsLoaded = true;
      } catch (e) { console.warn('Could not load seeds', e); }
    }

    async function prefetchPlayoffRecords(teamIds) {
      const needed = teamIds.filter(id => !(id in playoffRecordCache));
      await Promise.allSettled(needed.map(async id => {
        try {
          const res = await fetch(`${CORE_API}/seasons/${NBA_SEASON}/types/3/teams/${id}/record?lang=en&region=us`);
          const data = await res.json();
          const overall = (data.items || []).find(i => i.type === 'total');
          playoffRecordCache[id] = overall?.summary || '';
        } catch { playoffRecordCache[id] = ''; }
      }));
    }

    function fmt(date) {
      return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function dateStr(offsetDays) {
      const d = new Date();
      d.setDate(d.getDate() + offsetDays);
      return d.toISOString().slice(0, 10).replace(/-/g, "");
    }

    function sectionLabel(offsetDays) {
      if (offsetDays === 0) return "Today";
      if (offsetDays === 1) return "Tomorrow";
      const d = new Date();
      d.setDate(d.getDate() + offsetDays);
      return d.toLocaleDateString([], { weekday: "long", month: "short", day: "numeric" });
    }

    function statusLabel(event) {
      const s = event.status;
      const type = s.type;
      if (type.state === "pre") {
        const d = new Date(event.date);
        return { text: d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }), live: false, upcoming: true };
      }
      if (type.state === "post") return { text: "Final", live: false, upcoming: false };
      const detail = type.shortDetail || type.detail || "";
      return { text: detail, live: true, upcoming: false };
    }

    function clockText(event) {
      const s = event.status;
      if (s.type.state !== "in") return "";
      return s.displayClock || "";
    }

    function renderCard(event) {
      const comps = event.competitions[0];
      const teams = comps.competitors;
      const away = teams.find(t => t.homeAway === "away") || teams[0];
      const home = teams.find(t => t.homeAway === "home") || teams[1];

      const { text: statusText, live, upcoming } = statusLabel(event);
      const clock = clockText(event);
      const isFinal = event.status.type.state === "post";

      const awayScore = upcoming ? null : parseInt(away.score || 0);
      const homeScore = upcoming ? null : parseInt(home.score || 0);
      const awayLeading = !upcoming && awayScore > homeScore;
      const homeLeading = !upcoming && homeScore > awayScore;
      const tie = !upcoming && awayScore === homeScore;

      const isPlayoff = !!(comps.series || event.season?.type === 3);
      const seriesNote = (comps.notes?.[0]?.headline || '').replace(' - ', ' · ');
      const seriesSummary = comps.series?.summary || '';

      function teamHTML(team, score, isLeading) {
        const rsRecord = team.records?.find(r => r.type === 'total')?.summary || "";
        const poRecord = isPlayoff ? (playoffRecordCache[team.id] || '') : '';
        const seed = isPlayoff && seedMap[team.id] ? `#${seedMap[team.id]}` : '';
        const logoUrl = team.team.logo || "";
        const cls = upcoming ? "" : (isLeading ? "leader" : (!tie ? "trailing" : ""));
        const scoreDisplay = upcoming
          ? '<span class="score" style="color:#ccc;font-size:1.1rem">—</span>'
          : `<span class="score ${cls}">${score}</span>`;
        return `
          <div class="team-row">
            ${seed ? `<span class="seed">${seed}</span>` : ''}
            ${logoUrl ? `<img class="team-logo" src="${logoUrl}" alt="${team.team.abbreviation}" />` : ""}
            <div class="team-meta">
              <span class="team-name">${team.team.shortDisplayName}</span>
              ${(poRecord || rsRecord) ? `<div class="team-sub">
                ${poRecord ? `<span class="playoff-rec">${poRecord} playoffs</span>` : ''}
                ${rsRecord ? `<span class="team-record">${rsRecord}</span>` : ''}
              </div>` : ''}
            </div>
            ${scoreDisplay}
          </div>`;
      }

      const cardClass = live ? "live" : (upcoming ? "upcoming" : (isFinal ? "final-score" : ""));
      const badgeClass = live ? "live" : (upcoming ? "upcoming" : "");

      return `
        <div class="card ${cardClass}">
          <div class="status-bar">
            ${live ? '<div class="live-dot"></div>' : ""}
            <span class="status-badge ${badgeClass}">${live ? "LIVE · " + statusText : (upcoming ? "Upcoming · " + statusText : statusText)}</span>
            ${clock ? `<span class="clock">${clock}</span>` : ""}
          </div>
          ${isPlayoff && (seriesNote || seriesSummary) ? `
          <div class="series-info">
            <span class="series-round">${seriesNote}</span>
            <span class="series-score-text">${seriesSummary}</span>
          </div>` : ''}
          <div class="teams">
            ${teamHTML(away, awayScore, awayLeading)}
            <div class="divider"></div>
            ${teamHTML(home, homeScore, homeLeading)}
          </div>
        </div>`;
    }

    function renderDays(days) {
      const stateOrder = { "in": 0, "pre": 1, "post": 2 };
      let html = "";
      let totalGames = 0;

      for (const { offset, events } of days) {
        const filtered = offset === 0
          ? [...events].sort((a, b) => (stateOrder[a.status.type.state] ?? 3) - (stateOrder[b.status.type.state] ?? 3))
          : events.filter(e => e.status.type.state === "pre");

        if (filtered.length === 0) continue;
        totalGames += filtered.length;

        html += `<div class="section-heading">${sectionLabel(offset)}</div>`;
        html += `<div class="grid">${filtered.map(renderCard).join("")}</div>`;
      }

      return { html, totalGames };
    }

    async function fetchDay(offsetDays) {
      const res = await fetch(`${API}?limit=20&dates=${dateStr(offsetDays)}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      return { offset: offsetDays, events: data.events || [] };
    }

    async function fetchScores() {
      const btn = document.getElementById("refresh-btn");
      const content = document.getElementById("content");
      const empty = document.getElementById("empty");
      const errMsg = document.getElementById("error-msg");
      const spinner = document.getElementById("spinner");
      const moreWrap = document.getElementById("more-games-wrap");

      btn.disabled = true;
      errMsg.style.display = "none";
      additionalLoaded = false;

      try {
        if (!seedsLoaded) await loadSeeds();
        const days = await Promise.all([0, 1, 2, 3].map(fetchDay));

        const isPostseason = days.some(d => d.events.some(e => e.season?.type === 3));
        if (isPostseason) {
          const teamIds = [...new Set(days.flatMap(d =>
            d.events.flatMap(e => e.competitions[0].competitors.map(c => c.id))
          ))];
          await prefetchPlayoffRecords(teamIds);
        }

        spinner.style.display = "none";

        const { html, totalGames } = renderDays(days);

        if (totalGames === 0) {
          content.innerHTML = "";
          empty.style.display = "block";
          moreWrap.style.display = "none";
        } else {
          empty.style.display = "none";
          content.innerHTML = html;
          moreWrap.style.display = "block";
          document.getElementById("more-games-btn").disabled = false;
        }

        document.getElementById("last-updated").textContent = "Updated " + fmt(new Date());
        posthog.capture('scores_loaded', { total_games: totalGames, is_initial_load: isInitialLoad });
        isInitialLoad = false;
        scheduleRefresh();
      } catch (e) {
        spinner.style.display = "none";
        errMsg.textContent = "Could not load scores: " + e.message;
        errMsg.style.display = "block";
        posthog.capture('scores_fetch_failed', { error_message: e.message });
        posthog.captureException(e);
      } finally {
        btn.disabled = false;
      }
    }

    async function loadMoreGames() {
      const btn = document.getElementById("more-games-btn");

      if (additionalLoaded) {
        const extra = document.getElementById("extra-games");
        const visible = extra.style.display !== "none";
        extra.style.display = visible ? "none" : "";
        btn.textContent = visible ? "Show additional games" : "Hide additional games";
        posthog.capture('additional_games_toggled', { action: visible ? 'hidden' : 'shown' });
        return;
      }

      btn.disabled = true;
      btn.textContent = "Loading...";

      try {
        const days = await Promise.all([4, 5, 6, 7, 8].map(fetchDay));

        const isPostseason = days.some(d => d.events.some(e => e.season?.type === 3));
        if (isPostseason) {
          const teamIds = [...new Set(days.flatMap(d =>
            d.events.flatMap(e => e.competitions[0].competitors.map(c => c.id))
          ))];
          await prefetchPlayoffRecords(teamIds);
        }

        const { html, totalGames } = renderDays(days);

        const extra = document.createElement("div");
        extra.id = "extra-games";
        extra.innerHTML = totalGames > 0 ? html : "";
        document.getElementById("content").appendChild(extra);

        additionalLoaded = true;
        btn.disabled = false;
        btn.textContent = "Hide additional games";
        posthog.capture('additional_games_shown', { total_games: totalGames });
      } catch (e) {
        btn.disabled = false;
        btn.textContent = "Show additional games";
        posthog.captureException(e);
      }
    }

    function scheduleRefresh() {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(fetchScores, 15000);
      document.getElementById("auto-refresh-note").textContent = "Auto-refreshes every 15 seconds";
    }

    fetchScores();
  </script>
</body>
</html>
